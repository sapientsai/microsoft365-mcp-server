name: Build .mcpb Desktop Extension

on:
  release:
    types: [published]

jobs:
  build-mcpb:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build .mcpb bundle
        working-directory: packages/microsoft365
        run: bash scripts/build-mcpb.sh

      - name: Upload .mcpb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" packages/microsoft365/microsoft365-mcp-server-*.mcpb
