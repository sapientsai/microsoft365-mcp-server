packages:
  - "packages/*"

# Required for `pnpm deploy` (Docker prod build) since pnpm 10, and the correct
# behavior once packages/core becomes a workspace dependency — workspace deps are
# hard-linked into the deployed node_modules rather than symlinked.
injectWorkspacePackages: true

# pnpm 11 requires an explicit allow/deny per dependency build script. Both were
# already skipped under pnpm 10 (no build config) and aren't on the build path —
# tsdown bundles via rolldown and the published artifact is prebuilt dist/.
allowBuilds:
  esbuild: false
  tldjs: false

# Force the patched Vite line. vite is transitive (vitest 4.x, dev-only) and the
# vulnerable versions (<7.3.2) are dev-server CVEs not reachable here, but this keeps
# the lockfile clean of the advisories. vitest 4.1.8 allows ^6 || ^7 || ^8; pin 7.x.
overrides:
  vite: "^7.3.2"
  # Pin a single functype across the workspace. somamcp pulls 1.4.4 while our packages
  # ask for ^1.4.3; two copies of functype's structurally-recursive Either type make
  # tsc blow the instantiation budget (TS2589). 1.4.4 satisfies every ^1.4.3 range.
  functype: "1.4.4"
publicHoistPattern:
  - "*eslint*"
  - "*prettier*"
  - "*vitest*"
  - "typescript"
  - "*rimraf*"
  - "*cross-env*"
minimumReleaseAgeExclude:
  - somamcp@1.1.0
